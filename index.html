<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyber Zen — Rain / Star</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="gl" aria-hidden="true"></canvas>
      <pre id="debugHud" aria-hidden="true">debugHud: JS not running yet…</pre>

      <!-- Top reveal zone (50px) -->
      <div id="topZone" aria-hidden="true"></div>
      <button id="modeSwitch" class="ui ui-fade" type="button" aria-label="Switch mode">
        <span class="modeLabel" data-mode="rain">Rain</span>
        <span class="modeSep">/</span>
        <span class="modeLabel" data-mode="snow">Star</span>
      </button>

      <!-- Deck -->
      <main id="deck" class="ui">
        <section id="editorShell" class="glass">
          <div id="editorTopRow" class="ui-row ui-fade">
            <div class="seg" role="group" aria-label="Font">
              <button class="segBtn" type="button" data-font="zen-sans" aria-pressed="false">Sans</button>
              <button class="segBtn" type="button" data-font="zen-serif" aria-pressed="false">Serif</button>
              <button class="segBtn" type="button" data-font="zen-mono" aria-pressed="false">Mono</button>
            </div>

            <div class="spacer"></div>

            <button id="exportTxt" class="ghostBtn" type="button">Export .txt</button>
          </div>

          <textarea
            id="editor"
            rows="10"
            spellcheck="false"
            placeholder="写下你的想法…（自动暂存于本地）"
            aria-label="Immersive editor"
          ></textarea>
        </section>
      </main>

      <!-- Vibe Mixer (hidden floating panel) -->
      <aside id="mixer" class="ui ui-fade glass" aria-label="Vibe Mixer">
        <div class="mixerTitle">Vibe Mixer</div>

        <label class="sliderRow">
          <span class="sliderLabel">Rain/Snow</span>
          <input id="sIntensity" type="range" min="0" max="1" step="0.01" />
        </label>

        <label class="sliderRow">
          <span class="sliderLabel">Blur</span>
          <input id="sBlur" type="range" min="0" max="22" step="0.5" />
        </label>

        <label class="sliderRow">
          <span class="sliderLabel">White noise</span>
          <input id="sNoise" type="range" min="0" max="1" step="0.01" />
        </label>

        <label class="sliderRow">
          <span class="sliderLabel">Music mix</span>
          <input id="sMusic" type="range" min="0" max="1" step="0.01" />
        </label>

        <button id="audioToggle" class="ghostBtn" type="button">Audio: Off</button>
      </aside>

      <!-- ZenTimer -->
      <section id="timer" class="ui ui-fade glass" aria-label="ZenTimer">
        <div class="timerRow">
          <div id="timeReadout" class="timeReadout">25:00</div>
          <div class="timerBtns">
            <button id="tMinus" class="ghostBtn" type="button" aria-label="Minus 1 minute">−</button>
            <button id="tPlus" class="ghostBtn" type="button" aria-label="Plus 1 minute">+</button>
            <button id="tStartStop" class="ghostBtn" type="button">Start</button>
            <button id="tReset" class="ghostBtn" type="button">Reset</button>
          </div>
        </div>

        <div class="timerViz">
          <div id="linearBar" class="linearBar" aria-hidden="true">
            <div id="linearFill" class="linearFill"></div>
          </div>
          <canvas id="ring" width="140" height="140" aria-hidden="true"></canvas>
        </div>
      </section>
    </div>

    <script src="./main.js"></script>
  </body>
</html>
